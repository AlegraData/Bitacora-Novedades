<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitácora Novedades Product | New Version</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:       #00C4A0;
      --primary-dark:  #00A888;
      --primary-light: #E0F7F4;
      --dark:          #1e2a3a;
      --dark-2:        #2d3748;
      --gray-50:       #f7fafc;
      --gray-100:      #f0f4f8;
      --gray-200:      #e2e8f0;
      --gray-400:      #a0aec0;
      --gray-600:      #718096;
      --gray-900:      #1a202c;
      --white:         #ffffff;
      --shadow:        0 4px 20px rgba(0,0,0,0.08);
      --shadow-hover:  0 8px 32px rgba(0,0,0,0.14);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--gray-100);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== NAVBAR ===== */
    nav {
      background: var(--dark);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .nav-logo {
      width: 32px;
      height: 32px;
    }

    .nav-title-group { display: flex; flex-direction: column; }

    .nav-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.2;
    }

    .nav-title span { color: var(--primary); }

    .nav-subtitle {
      font-size: 11px;
      color: var(--gray-400);
      letter-spacing: 0.4px;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gray-400);
      font-size: 13px;
    }

    .nav-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--white);
      overflow: hidden;
      flex-shrink: 0;
    }

    .nav-avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ===== HERO ===== */
    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--white);
      border-radius: 16px;
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s;
    }

    .card:hover { box-shadow: var(--shadow-hover); }

    .card-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-light);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 20px;
    }

    .card-tag {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary-dark);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--gray-600);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* CTA Button */
    .btn-enter {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }

    .btn-enter:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-enter:active { transform: translateY(0); }

    .btn-enter .arrow { margin-left: 8px; font-size: 16px; }

    /* ===== FOOTER ===== */
    footer {
      background: var(--dark);
      padding: 0 32px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .footer-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gray-400);
      font-size: 13px;
    }

    .footer-center {
      font-size: 12px;
      color: var(--gray-600);
    }

    /* Alegra logo SVG inline */
    .logo-svg { width: 28px; height: 20px; }
  </style>
</head>

  <script>
    console.log('[Bitácora] Landing cargada. Obteniendo URL real...');

    // Construir URL de la app dinámicamente
    google.script.run
      .withSuccessHandler(function(url) {
        document.getElementById('btnEnter').href = url + '?page=app';
      })
      .getAppUrl();

    // Cargar usuario actual
    console.log('[Bitácora] Solicitando usuario actual...');
    google.script.run
      .withSuccessHandler(function(user) {
        console.log('[Bitácora] Usuario recibido:', user.email, '| Nombre:', user.name, '| Foto:', !!user.photo);
        var avatarEl = document.getElementById('navAvatar');
        var nameEl   = document.getElementById('navName');

        nameEl.textContent = user.name || user.email;
        nameEl.style.color = '#e2e8f0';

        if (user.photo) {
          avatarEl.innerHTML = '<img src="' + user.photo + '" alt="' + user.name + '">';
        } else {
          avatarEl.textContent = (user.name || user.email).charAt(0).toUpperCase();
        }
      })
      .withFailureHandler(function(err) {
        console.error('[Bitácora] Error cargando usuario:', err);
      })
      .getCurrentUser();

    // Inicializar hojas si es primera vez
    console.log('[Bitácora] Inicializando app...');
    google.script.run
      .withSuccessHandler(function(res) {
        console.log('[Bitácora] initApp resultado:', res.success ? 'OK' : res.error);
      })
      .withFailureHandler(function(err) {
        console.error('[Bitácora] Error en initApp:', err);
      })
      .initApp();
  </script>
